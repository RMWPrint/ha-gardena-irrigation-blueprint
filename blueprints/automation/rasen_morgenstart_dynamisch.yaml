blueprint:
  name: Rasenbewässerung - dynamischer Morgenstart vor Sonnenaufgang
  description: >
    Startet ein Morgenlogik-Script dynamisch vor Sonnenaufgang.
    Die Startzeit wird anhand der Anzahl der Durchläufe, der eingestellten
    Langprogramm-Dauer und einer fixen Pause von 5 Minuten zwischen den
    Durchläufen berechnet.

    Zusätzlich kann ein Kurzprogramm-Helfer ausgewählt werden, damit die
    zugehörige Morgenlogik mit Kurz- und Langprogramm arbeiten kann.

    Gedacht für Bewässerungen mit 1-6 Gardena Impulsregnern,
    Gardena Wasserverteiler und einem smarten Bewässerungsventil.
  domain: automation
  author: Rudolf Walder

  input:
    automatik_helfer:
      name: Automatik-Helfer
      description: Input Boolean, der die Bewässerungsautomatik aktiviert oder deaktiviert.
      selector:
        entity:
          domain: input_boolean

    sonnenaufgang_sensor:
      name: Sonnenaufgang-Sensor
      description: Sensor mit dem nächsten Sonnenaufgang als Datum/Uhrzeit.
      selector:
        entity:
          domain: sensor

    anzahl_durchlaeufe:
      name: Anzahl Durchläufe
      description: Input Number mit der Anzahl der aktiven Kreise/Regner.
      selector:
        entity:
          domain: input_number

    kurzprogramm:
      name: Kurzprogramm
      description: Input Select oder Input Number mit der Kurzprogramm-Dauer in Minuten.
      selector:
        entity:
          domain:
            - input_select
            - input_number

    langprogramm:
      name: Langprogramm
      description: Input Select oder Input Number mit der Langprogramm-Dauer in Minuten.
      selector:
        entity:
          domain:
            - input_select
            - input_number

    morgenlogik_script:
      name: Morgenlogik-Script
      description: Script, das die eigentliche Wetterentscheidung und Bewässerung ausführt.
      selector:
        entity:
          domain: script

mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

variables:
  automatik_helfer: !input automatik_helfer
  sonnenaufgang_sensor: !input sonnenaufgang_sensor
  anzahl_durchlaeufe: !input anzahl_durchlaeufe
  kurzprogramm: !input kurzprogramm
  langprogramm: !input langprogramm
  morgenlogik_script: !input morgenlogik_script
  pause_minuten: 5

condition:
  - condition: template
    value_template: >
      {{ states(automatik_helfer) == 'on' }}

  - condition: template
    value_template: >
      {% set sr = states(sonnenaufgang_sensor) %}
      {% if sr in ['unknown', 'unavailable', 'none'] %}
        false
      {% else %}
        {% set durchlaeufe = states(anzahl_durchlaeufe) | int(1) %}
        {% set lang = states(langprogramm) | int(50) %}
        {% set pause = pause_minuten | int(5) %}
        {% set dauer_min = (durchlaeufe * lang) + ((durchlaeufe - 1) * pause) %}
        {% set sunrise = as_timestamp(sr) %}
        {% set start = sunrise - (dauer_min * 60) %}
        {% set now_ts = as_timestamp(now()) %}
        {{ now_ts >= start and now_ts < start + 60 }}
      {% endif %}

action:
  - service: script.turn_on
    target:
      entity_id: !input morgenlogik_script
